<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Finans">
    
    <title>Finansal Kontrol Merkezi</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-dark: #000000; --card-bg: #1c1c1e; --text-main: #ffffff; --text-muted: #8e8e93; --neon-green: #34c759; --neon-red: #ff3b30; --neon-blue: #0a84ff; --border-color: #2c2c2e; }
        
        /* iOS Kayan Engelleme ve Dynamic Island Ayarları */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            /* iPhone ekranlarının çentiği ve alt çizgisi için güvenlik boşlukları */
            padding-top: env(safe-area-inset-top); 
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: 16px; padding-right: 16px;
            overflow-x: hidden;
        }

        .header { text-align: center; margin: 20px 0; }
        .header h1 { font-size: 24px; font-weight: 700; letter-spacing: 0.5px; }
        .header p { font-size: 13px; margin-top: 4px; color: var(--text-muted); }
        #baglanti-durumu { font-weight: 600; color: #ffd60a; }

        /* iOS Tarzı Kartlar */
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 24px; }
        .dashboard-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .card { background-color: var(--card-bg); padding: 18px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card h3 { color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 600; }
        .amount { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
        .text-green { color: var(--neon-green); } .text-red { color: var(--neon-red); } .text-blue { color: var(--neon-blue); }

        /* İlerleme Çubuğu ve Liste */
        .progress-container { width: 100%; background-color: #000; border-radius: 10px; height: 10px; margin-top: 8px; }
        .progress-bar { height: 100%; border-radius: 10px; transition: width 1s ease-in-out; }
        .radar-item { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border-color); }
        .radar-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .radar-item span { display: flex; justify-content: space-between; font-size: 15px; align-items: center; }

        .transaction-list { list-style: none; }
        .transaction-list li { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border-color); }
        .transaction-list li:last-child { border-bottom: none; }
        .t-info { display: flex; flex-direction: column; } 
        .t-title { font-weight: 600; font-size: 16px; text-transform: capitalize; } 
        .t-date { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
        .t-amount { font-weight: 700; font-size: 16px; }
        .chart-container { position: relative; width: 100%; height: 220px; display: flex; justify-content: center; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Finans Merkezi</h1>
        <p>Sistem: <span id="baglanti-durumu">Veriler Çekiliyor...</span></p>
    </div>

    <div class="card" style="margin-bottom: 16px; text-align: center;">
        <h3>Net Servet</h3>
        <div class="amount text-main" id="val-net-servet" style="font-size: 36px;">₺ ---</div>
    </div>

    <div class="dashboard-grid-2">
        <div class="card"><h3>Kasa</h3><div class="amount text-green" id="val-kasa" style="font-size: 22px;">₺ ---</div></div>
        <div class="card"><h3>Toplam Borç</h3><div class="amount text-red" id="val-borc" style="font-size: 22px;">₺ ---</div></div>
    </div>

    <div class="card" style="margin-bottom: 16px;">
        <h3 style="border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px;">💳 Kredi Kartı</h3>
        <div class="radar-item"><span><strong style="color:var(--text-muted)">Toplam Borç</strong> <b id="val-kart-toplam">₺ ---</b></span></div>
        <div class="radar-item"><span><strong>Bu Ay (24'ü)</strong> <b class="text-red" id="val-kart-buay">₺ ---</b></span></div>
        <div class="radar-item"><span><strong>Gelecek Aya Sarkan</strong> <b class="text-blue" id="val-kart-gelecek">₺ ---</b></span></div>
    </div>

    <div class="dashboard-grid-2">
        <div class="card" style="display: flex; flex-direction: column; align-items: center;">
            <h3 style="align-self: flex-start;">Aylık Dağılım</h3>
            <div class="chart-container"><canvas id="expenseChart"></canvas></div>
        </div>
        <div class="card">
            <h3 style="margin-bottom: 15px;">🏦 Krediler</h3>
            <div class="radar-item" style="border:none; padding:0;">
                <span style="font-size: 13px; margin-bottom: 4px;"><strong>Nev Kredisi</strong></span>
                <span style="font-size: 12px; color: var(--text-muted);"><b id="val-nev-yuzde">%--</b></span>
                <div class="progress-container"><div class="progress-bar" id="bar-nev" style="width: 0%; background-color: var(--neon-green);"></div></div>
            </div>
            <div class="radar-item" style="border:none; padding:0; margin-top: 20px;">
                <span style="font-size: 13px; margin-bottom: 4px;"><strong>Getir Kredisi</strong></span>
                <span style="font-size: 12px; color: var(--text-muted);"><b id="val-getir-yuzde">%--</b></span>
                <div class="progress-container"><div class="progress-bar" id="bar-getir" style="width: 0%; background-color: var(--neon-blue);"></div></div>
            </div>
        </div>
    </div>

    <div class="card" style="margin-bottom: 30px;">
        <h3>Son İşlemler</h3>
        <ul class="transaction-list" id="islem-listesi">
            <li><div class="t-info"><span class="t-title">Veriler yükleniyor...</span></div></li>
        </ul>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwMd0e-v5_8CZ5jvNNvqHrxwMGMWrP6OSZBErj0SBT6MIXqQ1edtrh-3CP2DixePGsLuw/exec";
        let expenseChartInstance = null; // Grafik objesi

        function formatTL(sayi) {
            if(isNaN(sayi) || sayi === "") return "₺ 0";
            return "₺ " + Number(sayi).toLocaleString('tr-TR');
        }

        async function verileriCek() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                if(data.durum === "basarili") {
                    document.getElementById('baglanti-durumu').innerText = "Senkronize";
                    document.getElementById('baglanti-durumu').style.color = "var(--neon-green)";

                    document.getElementById('val-net-servet').innerText = formatTL(data.netServet);
                    document.getElementById('val-kasa').innerText = formatTL(data.toplamKasa);
                    document.getElementById('val-borc').innerText = formatTL(data.toplamBorc);
                    document.getElementById('val-kart-toplam').innerText = formatTL(data.kartToplam);
                    document.getElementById('val-kart-buay').innerText = formatTL(data.kartBuAy);
                    document.getElementById('val-kart-gelecek').innerText = formatTL(data.kartGelecek);
                    
                    document.getElementById('val-nev-yuzde').innerText = "%" + data.nevYuzde;
                    document.getElementById('bar-nev').style.width = data.nevYuzde + "%";
                    document.getElementById('val-getir-yuzde').innerText = "%" + data.getirYuzde;
                    document.getElementById('bar-getir').style.width = data.getirYuzde + "%";

                    // Son 5 İşlemi Ekrana Bas
                    const listeDOM = document.getElementById('islem-listesi');
                    listeDOM.innerHTML = ""; // eskiyi sil
                    
                    data.sonIslemler.forEach(islem => {
                        let renk = islem.tur === "Gelir" ? "text-green" : "text-main";
                        let isaret = islem.tur === "Gelir" ? "+" : "-";
                        let tutarYazi = islem.tur === "Gelir" ? formatTL(islem.tutar) : formatTL(islem.tutar);
                        
                        let li = `<li>
                            <div class="t-info">
                                <span class="t-title">${islem.kalem}</span>
                                <span class="t-date">${islem.tarih.substring(0,10)} | ${islem.odeme}</span>
                            </div>
                            <div class="t-amount ${renk}">${isaret} ${tutarYazi}</div>
                        </li>`;
                        listeDOM.innerHTML += li;
                    });

                    // Pasta Grafiği Güncelle
                    grafigiCiz(data.pastaGrafik);

                }
            } catch (error) {
                document.getElementById('baglanti-durumu').innerText = "Çevrimdışı";
                document.getElementById('baglanti-durumu').style.color = "var(--neon-red)";
            }
        }

        function grafigiCiz(kategoriData) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            
            // Sadece etiketleri ve tutarları array'e ayırıyoruz
            const labels = kategoriData.map(item => item.isim);
            const values = kategoriData.map(item => item.toplam);

            if(expenseChartInstance) { expenseChartInstance.destroy(); } // Eski grafiği sil

            expenseChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: ['#0a84ff', '#ff3b30', '#34c759', '#ffcc00', '#af52de'],
                        borderWidth: 0
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    cutout: '75%', 
                    plugins: { 
                        legend: { display: false } // İsimler mobilde yer kaplamasın diye kapattım
                    } 
                }
            });
        }

        verileriCek();
    </script>
</body>
</html>
